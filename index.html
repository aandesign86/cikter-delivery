<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab Web Demo - Fixed Version</title>
    
    <!-- Tailwind CSS untuk UI Premium -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .floating-panel { z-index: 1000; }
        .suggestion-box::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col md:block">

    <!-- CONTAINER UTAMA -->
    <div class="relative w-full h-MASUKKAN_API_KEY_ANDA_DISINIfull flex flex-col md:block">
        
        <!-- PETA UTAMA GOOGLE MAPS -->
        <div id="map" class="flex-grow md:absolute md:inset-0"></div>

        <!-- PANEL PEMESANAN RESPONSIF (Bottom Sheet di HP) -->
        <div class="floating-panel bg-white rounded-t-3xl md:rounded-2xl shadow-2xl p-5 w-full md:max-w-md md:absolute md:top-4 md:left-4 max-h-[60vh] md:max-h-[90vh] overflow-y-auto flex flex-col pb-8 md:pb-5">
            
            <!-- Garis Handle HP -->
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4 md:hidden"></div>

            <!-- Logo Grab -->
            <div class="flex items-center justify-between mb-4 md:mb-6">
                <span class="text-2xl md:text-3xl font-extrabold text-[#00B14F] tracking-tight">Grab<span class="text-gray-800 font-light text-xl ml-1">Demo</span></span>
                <div class="flex space-x-2">
                    <button class="bg-gray-100 p-2 rounded-full text-gray-600 hover:bg-gray-200 text-sm"><i class="fa-solid fa-history"></i></button>
                    <button class="bg-gray-100 p-2 rounded-full text-gray-600 hover:bg-gray-200 text-sm"><i class="fa-solid fa-user"></i></button>
                </div>
            </div>

            <!-- Pilihan Layanan -->
            <div class="flex space-x-4 mb-4 border-b border-gray-100 pb-2">
                <button class="flex items-center space-x-2 pb-2 border-b-2 border-[#00B14F] text-[#00B14F] font-bold text-sm">
                    <i class="fa-solid fa-motorcycle"></i> <span>GrabBike</span>
                </button>
                <button class="flex items-center space-x-2 pb-2 text-gray-400 text-sm">
                    <i class="fa-solid fa-car"></i> <span>GrabCar</span>
                </button>
            </div>

            <!-- Form Input Lokasi -->
            <div class="space-y-3 relative">
                <!-- Garis Dot -->
                <div class="absolute left-3.5 top-5 w-0.5 h-10 bg-gray-200 z-10"></div>

                <!-- Input Jemput -->
                <div class="relative">
                    <div class="absolute left-3 top-3.5 z-20 flex items-center">
                        <i class="fa-solid fa-circle text-[#00B14F] text-[10px]"></i>
                    </div>
                    <input id="input-jemput" type="text" placeholder="Mau dijemput di mana?" autocomplete="off"
                        class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#00B14F] focus:bg-white shadow-sm transition">
                    <!-- Suggestion Box -->
                    <div id="suggest-jemput" class="suggestion-box hidden absolute left-0 right-0 top-11 bg-white border border-gray-200 rounded-xl shadow-xl max-h-48 overflow-y-auto z-50"></div>
                </div>

                <!-- Input Antar -->
                <div class="relative">
                    <div class="absolute left-3 top-3.5 z-20 flex items-center">
                        <i class="fa-solid fa-location-dot text-red-500 text-xs"></i>
                    </div>
                    <input id="input-antar" type="text" placeholder="Mau antar ke mana?" autocomplete="off"
                        class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#00B14F] focus:bg-white shadow-sm transition">
                    <!-- Suggestion Box -->
                    <div id="suggest-antar" class="suggestion-box hidden absolute left-0 right-0 top-11 bg-white border border-gray-200 rounded-xl shadow-xl max-h-48 overflow-y-auto z-50"></div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden text-center my-3 text-[#00B14F]">
                <i class="fa-solid fa-circle-notch animate-spin text-xl"></i>
            </div>

            <!-- DETAIL TARIF & PEMBAYARAN -->
            <div id="panel-tarif" class="hidden mt-4 pt-3 border-t border-gray-100">
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl mb-3">
                    <div class="flex items-center space-x-3">
                        <div class="bg-[#00B14F] text-white p-2 rounded-lg text-md"><i class="fa-solid fa-motorcycle"></i></div>
                        <div>
                            <p class="font-bold text-gray-800 text-xs">GrabBike</p>
                            <p class="text-[10px] text-gray-500" id="text-jarak">0 km</p>
                        </div>
                    </div>
                    <span class="text-lg font-extrabold text-gray-900" id="text-harga">Rp 0</span>
                </div>

                <button onclick="alert('Pesanan Terkirim!')" class="w-full bg-[#00B14F] text-white font-bold py-3 rounded-xl shadow-md text-sm">
                    Pesan GrabBike
                </button>
            </div>

        </div>
    </div>

    <!-- SDK Google Maps (Tetap dipasang untuk background peta) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC94TviIuelGJLjcURv6awTnbmO8EzARk8&callback=initMap" async defer></script>

    <script>
        let map, polylineRoute, markerJemput, markerAntar;
        let koordinatJemput = null, koordinatAntar = null;

        const LAT_JAKARTA = -6.2088;
        const LON_JAKARTA = 106.8456;

        function initMap() {
            // Gambar peta dasar Google Maps tetap muncul walau ada watermark demo
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: { lat: LAT_JAKARTA, lng: LON_JAKARTA },
                disableDefaultUI: true,
                zoomControl: true
            });

            setupAutocomplete('input-jemput', 'suggest-jemput', (lat, lng, name) => {
                koordinatJemput = { lat, lng };
                setCustomMarker('jemput', koordinatJemput);
                hitungRuteDanTarif();
            });

            setupAutocomplete('input-antar', 'suggest-antar', (lat, lng, name) => {
                koordinatAntar = { lat, lng };
                setCustomMarker('antar', koordinatAntar);
                hitungRuteDanTarif();
            });
        }

        // Fitur Autocomplete Anti-Error & Sangat Lengkap (Menggunakan API Publik)
        function setupAutocomplete(inputId, suggestId, onSelect) {
            const input = document.getElementById(inputId);
            const suggestBox = document.getElementById(suggestId);

            input.addEventListener('input', debounce(function() {
                const query = input.value;
                if (query.length < 3) { suggestBox.classList.add('hidden'); return; }

                // Mencari tempat se-Indonesia yang sangat lengkap
                fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=${LAT_JAKARTA}&lon=${LON_JAKARTA}&limit=5`)
                .then(res => res.json())
                .then(data => {
                    suggestBox.innerHTML = '';
                    if(!data.features || data.features.length === 0) { suggestBox.classList.add('hidden'); return; }

                    data.features.forEach(feat => {
                        const props = feat.properties;
                        const namaUtama = props.name || props.street || 'Lokasi Terpilih';
                        const detail = [props.street, props.district, props.city].filter(Boolean).slice(0, 2).join(', ');

                        const item = document.createElement('div');
                        item.className = 'p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-100 flex items-start space-x-3 text-left';
                        item.innerHTML = `
                            <i class="fa-solid fa-location-dot text-gray-400 mt-1 text-xs flex-shrink-0"></i> 
                            <div class="truncate">
                                <p class="text-gray-800 font-semibold text-xs truncate">${namaUtama}</p>
                                <p class="text-gray-400 text-[10px] truncate">${detail || 'Indonesia'}</p>
                            </div>
                        `;
                        
                        item.addEventListener('click', () => {
                            input.value = namaUtama;
                            suggestBox.classList.add('hidden');
                            // Koordinat dari API ini terbalik [lon, lat], kita balik menjadi [lat, lon]
                            const lng = feat.geometry.coordinates[0];
                            const lat = feat.geometry.coordinates[1];
                            onSelect(lat, lng, namaUtama);
                        });
                        suggestBox.appendChild(item);
                    });
                    suggestBox.classList.remove('hidden');
                });
            }, 400));

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !suggestBox.contains(e.target)) {
                    suggestBox.classList.add('hidden');
                }
            });
        }

        function setCustomMarker(tipe, koordinat) {
            if (tipe === 'jemput') {
                if (markerJemput) markerJemput.setMap(null);
                markerJemput = new google.maps.Marker({
                    position: koordinat,
                    map: map,
                    icon: { url: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png' }
                });
            } else {
                if (markerAntar) markerAntar.setMap(null);
                markerAntar = new google.maps.Marker({
                    position: koordinat,
                    map: map,
                    icon: { url: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png' }
                });
            }
            map.setCenter(koordinat);
            map.setZoom(14);
        }

        function hitungRuteDanTarif() {
            if (!koordinatJemput || !koordinatAntar) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('panel-tarif').classList.add('hidden');
            if (polylineRoute) polylineRoute.setMap(null);

            // Menggunakan API Router Jalanan Alternatif agar bebas hambatan
            fetch(`https://router.project-osrm.org/route/v1/driving/${koordinatJemput.lng},${koordinatJemput.lat};${koordinatAntar.lng},${koordinatAntar.lat}?overview=full&geometries=geojson`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').classList.add('hidden');
                if(!data.routes || data.routes.length === 0) return;

                const rute = data.routes[0];
                const koordinatGaris = rute.geometry.coordinates.map(c => ({ lat: c[1], lng: c[0] }));

                // Gambar Garis Rute Hijau Tebal khas Grab di Atas Google Maps!
                polylineRoute = new google.maps.Polyline({
                    path: koordinatGaris,
                    geodesic: true,
                    strokeColor: '#00B14F',
                    strokeOpacity: 0.9,
                    strokeWeight: 6,
                    map: map
                });

                // Zoom otomatis agar rute terlihat utuh
                const bounds = new google.maps.LatLngBounds();
                koordinatGaris.forEach(p => bounds.extend(p));
                map.fitBounds(bounds);

                // Hitung Jarak & Tarif Realistis
                const jarakKm = rute.distance / 1000;
                let tarif = Math.round(jarakKm * 3500);
                if (tarif < 10000) tarif = 10000;

                document.getElementById('text-jarak').innerText = `${jarakKm.toFixed(1)} km`;
                document.getElementById('text-harga').innerText = `Rp ${tarif.toLocaleString('id-ID')}`;
                document.getElementById('panel-tarif').classList.remove('hidden');
            })
            .catch(() => { document.getElementById('loading').classList.add('hidden'); });
        }

        function debounce(func, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }
    </script>
</body>
</html>
