<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CIKTER DELIVERY</title>

<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<link rel="stylesheet" href="css/style.css"> <!-- kalau ada CSS eksternal -->
<script src="js/auth.js"></script>

</head>
<body>

<!-- MODAL UMUM -->
<div id="modal" class="modal">
  <div class="modal-box">
    <p id="modal-text"></p>
    <a id="modal-link" target="_blank">Gabung Grup WhatsApp</a>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<!-- RESET PASSWORD POPUP -->
<div id="resetModal" class="modal">
  <div class="modal-box">
    <p>Masukkan email terdaftar</p>
    <input id="resetEmail" type="email" placeholder="Email">
    <button onclick="requestReset()">Kirim Link Reset</button>
    <button onclick="closeReset()" style="background:#777;margin-top:5px;">Batal</button>
  </div>
</div>

<div class="login-card">
  <h2>Login</h2>
  <form onsubmit="login(event)">
    <input id="email" placeholder="Email" required>
    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Password" required>
      <span class="toggle-password material-icons-outlined" onclick="togglePassword()">visibility</span>
    </div>
    <button type="submit">Login</button>
  </form>

  <div class="login-footer">
    Belum punya akun? <a href="register.html">Daftar</a><br>
    <a href="#" onclick="openReset()">Lupa Password?</a>
  </div>
</div>

</body>
</html>
